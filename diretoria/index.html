<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#080f18">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <title>Frota — Diretoria</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;600;700;900&family=Barlow:wght@300;400;500&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">

  <script>
    const CSV_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vTd77MkT5hd6gzTkMfzX2BVWY5Hqqfo3NluQY58mnOklN8--hPVIoe2CfzkbttnucJKbnJFiaPEWSmR/pub?gid=1559964021&single=true&output=csv';
    const SYNC_INTERVAL = 5 * 60 * 1000;
    const OP_CORES = {LS:'#e84040', TL:'#2ed573', HT:'#1a6bbf', CV:'#f5d800'};

    let todosLanc = [];
    let filtroOp = 'TODAS';
    let abaPainel = 'dashboard';
    let historicoDatas = [];
    let historicoDataSel = null;
    let dataProg = null;

    // ── CSV ───────────────────────────────────────────────────
    async function fetchCSV() {
      const resp = await fetch(CSV_URL + '&cachebust=' + Date.now());
      const text = await resp.text();
      const lines = text.split(/\r?\n/).filter(l => l.trim());
      if (lines.length < 2) return [];
      return lines.slice(1).map(parseLine);
    }

    // ATENÇÃO: A planilha teve uma coluna nova inserida (PONTO_OFF_MOTO.)
    // antes da coluna DESTINO, o que empurrou todas as colunas seguintes
    // uma posição para frente. Os índices abaixo foram corrigidos e
    // conferidos linha a linha contra o CSV real em 04/07/2026.
    function parseLine(line) {
      const cols = []; let cur = '', inQ = false;
      for (let i = 0; i < line.length; i++) {
        const c = line[i];
        if (c === '"') { if (inQ && line[i+1]==='"') { cur+='"'; i++; } else inQ=!inQ; }
        else if (c === ',' && !inQ) { cols.push(cur.trim()); cur=''; }
        else cur += c;
      }
      cols.push(cur.trim());
      return {
        DATA:               cols[0]  || '',
        DIA:                cols[1]  || '',
        OP:                 cols[2]  || '',
        VEICULO:            cols[3]  || '',
        MOTORISTA:          cols[4]  || '',
        PONTO_ON:           cols[5]  || '',
        PREVISAO_REFEICAO:  cols[7]  || '',
        DESTINO:            cols[8]  || '',
        SAIDA_VEICULO_CD:   cols[9]  || '',
        SM:                 cols[11] || '',
        ABERTURA_1:         cols[17] || '',
        SAIDA_1:            cols[19] || '',
        CHEGADA_VEICULO_CD: cols[28] || '',
        PONTO_OFF_MOT:      cols[29] || '',
        HORA_TOTAL:         cols[30] || '',
        KM_CHEGADA:         cols[32] || '',
        KM_PERCORRIDO:      cols[34] || '',
      };
    }

    // ── Datas ─────────────────────────────────────────────────
    function hojeISO() {
      const d = new Date(new Date().toLocaleString('en-US', {timeZone:'America/Sao_Paulo'}));
      return `${String(d.getDate()).padStart(2,'0')}/${String(d.getMonth()+1).padStart(2,'0')}/${String(d.getFullYear()).slice(-2)}`;
    }
    function dataFuturaISO(n) {
      const d = new Date(new Date().toLocaleString('en-US', {timeZone:'America/Sao_Paulo'}));
      d.setDate(d.getDate()+n);
      return `${String(d.getDate()).padStart(2,'0')}/${String(d.getMonth()+1).padStart(2,'0')}/${String(d.getFullYear()).slice(-2)}`;
    }
    function parseDate(iso) {
      const [dd,mm,aa] = iso.split('/');
      return new Date(parseInt(aa.length===2?'20'+aa:aa), parseInt(mm)-1, parseInt(dd));
    }
    function labelData(iso) {
      const dias = ['dom','seg','ter','qua','qui','sex','sáb'];
      return `${iso} (${dias[parseDate(iso).getDay()]})`;
    }

    // ── Status ────────────────────────────────────────────────
    function calcStatus(v) {
      const agora = new Date(new Date().toLocaleString('en-US',{timeZone:'America/Sao_Paulo'}));
      const hMin  = agora.getHours()*60+agora.getMinutes();
      const tMin  = t => { if(!t) return null; const p=t.split(':').map(Number); return p[0]*60+(p[1]||0); };
      const isHoje = v.DATA === hojeISO();
      if (v.CHEGADA_VEICULO_CD && v.KM_CHEGADA) return {key:'concluido', label:'Concluído',   cor:'#34d399'};
      if (v.SAIDA_1 || v.ABERTURA_1)            return {key:'rota',      label:'Em rota',     cor:'#fbbf24'};
      const saidaMin = tMin(v.SAIDA_VEICULO_CD);
      // Só considera "Em trânsito" quando o horário atual já ultrapassou
      // o horário programado de saída. Ter um horário cadastrado não
      // significa que o veículo já saiu — antes disso continua Pendente.
      if (saidaMin !== null && isHoje && hMin >= saidaMin) return {key:'transito', label:'Em trânsito', cor:'#f97316'};
      return {key:'pendente', label:'Pendente', cor:'#6b8099'};
    }

    function escalado(v) {
      if (!v.MOTORISTA || !v.MOTORISTA.trim()) return false;
      if (!v.DESTINO || !v.DESTINO.trim()) return false;
      if (/RESERVA/i.test(v.VEICULO) || /RESERVA/i.test(v.MOTORISTA) || /RESERVA/i.test(v.DESTINO)) return false;
      return true;
    }

    // ── Sync ──────────────────────────────────────────────────
    async function sincronizar(silencioso) {
      const btnEl = document.getElementById('btn-sync');
      const statusEl = document.getElementById('sync-status');
      if (!silencioso && btnEl) { btnEl.disabled=true; btnEl.textContent='⏳ Atualizando...'; }
      try {
        const linhas = await fetchCSV();
        todosLanc = linhas.filter(r => r.OP && r.DATA && r.VEICULO);
        const datasSet = new Set(todosLanc.map(r=>r.DATA));
        historicoDatas = [...datasSet].filter(d=>/^\d{2}\/\d{2}\/\d{2,4}$/.test(d))
          .sort((a,b) => parseDate(b)-parseDate(a));
        if (!dataProg) dataProg = dataFuturaISO(1);
        atualizarDashboard();
        const agora = new Date().toLocaleTimeString('pt-BR');
        if (statusEl) { statusEl.textContent=`✅ ${agora}`; statusEl.className='sync-ok'; }
      } catch(e) {
        if (statusEl) { statusEl.textContent='❌ Erro'; statusEl.className='sync-err'; }
      }
      if (!silencioso && btnEl) { btnEl.disabled=false; btnEl.textContent='🔄 Atualizar'; }
    }

    function atualizarDashboard() {
      if (abaPainel==='dashboard')   renderDashboard();
      else if (abaPainel==='programacao') renderProgramacao();
      else if (abaPainel==='historico')   renderHistorico();
    }

    // ── Dashboard ─────────────────────────────────────────────
    function renderDashboard() {
      const hoje = hojeISO();
      const lancHoje = todosLanc.filter(r => r.DATA === hoje);
      const esc = lancHoje.filter(escalado);

      // KPIs principais
      document.getElementById('kpi-total').textContent   = esc.length || '—';
      document.getElementById('kpi-conc').textContent    = esc.filter(v=>calcStatus(v).key==='concluido').length;
      document.getElementById('kpi-op').textContent      = esc.filter(v=>['rota','transito'].includes(calcStatus(v).key)).length;
      document.getElementById('kpi-pend').textContent    = esc.filter(v=>calcStatus(v).key==='pendente').length;

      // Barras por OP
      const opBar = document.getElementById('op-bar');
      if (opBar) {
        const ops = ['LS','TL','HT','CV'];
        opBar.innerHTML = ops.map(op => {
          const n = esc.filter(v=>v.OP===op).length;
          const cor = OP_CORES[op]||'#6b8099';
          return `<div class="op-card" style="border-left:4px solid ${cor}">
            <span class="op-sig" style="color:${cor}">${op}</span>
            <span class="op-cnt" style="color:${cor}">${n}</span>
          </div>`;
        }).join('');
      }

      // Filtros
      document.querySelectorAll('.btn-op').forEach(b =>
        b.classList.toggle('ativo', b.dataset.op === filtroOp)
      );

      renderTabela(esc);
    }

    function renderTabela(esc) {
      let lista = filtroOp === 'TODAS' ? [...esc] : esc.filter(v=>v.OP===filtroOp);
      const ord = {pendente:0,transito:1,rota:2,concluido:3};
      lista.sort((a,b)=>(ord[calcStatus(a).key]||0)-(ord[calcStatus(b).key]||0));

      const cnt = document.getElementById('cnt-label');
      if (cnt) cnt.textContent = `${lista.length} registro${lista.length!==1?'s':''}`;

      const tbody = document.getElementById('tbody');
      if (!tbody) return;
      if (!lista.length) {
        tbody.innerHTML = `<tr><td colspan="9" class="empty-row">Nenhum lançamento encontrado.</td></tr>`;
        return;
      }
      tbody.innerHTML = lista.map(v => {
        const st  = calcStatus(v);
        const cor = OP_CORES[v.OP]||'#6b8099';
        return `<tr>
          <td><span class="op-pill" style="background:${cor}20;color:${cor}">${v.OP||'—'}</span></td>
          <td class="col-placa">${v.VEICULO||'—'}</td>
          <td>${v.MOTORISTA||'—'}</td>
          <td class="col-dest">${v.DESTINO||'—'}</td>
          <td class="mono">${v.PONTO_ON||'—'}</td>
          <td class="mono">${v.SAIDA_VEICULO_CD||'—'}</td>
          <td class="mono">${v.CHEGADA_VEICULO_CD||'—'}</td>
          <td class="mono">${v.KM_PERCORRIDO?v.KM_PERCORRIDO+' km':'—'}</td>
          <td><span class="st-dot" style="background:${st.cor}"></span>${st.label}</td>
        </tr>`;
      }).join('');
    }

    window.setFiltroOp = (op) => { filtroOp=op; renderDashboard(); };

    // ── Programação ───────────────────────────────────────────
    function renderProgramacao() {
      const picker = document.getElementById('prog-picker');
      const lista  = document.getElementById('prog-lista');
      if (!picker||!lista) return;
      const hoje = hojeISO();
      const futuras = historicoDatas.filter(d => parseDate(d) >= parseDate(hoje));
      const dias = ['dom','seg','ter','qua','qui','sex','sáb'];
      picker.innerHTML = futuras.map(d => {
        const lbl = d===hoje ? `Hoje ${d} (${dias[parseDate(d).getDay()]})` : labelData(d);
        return `<button class="btn-data${d===dataProg?' btn-data-ativa':''}" onclick="selecionarProg('${d}')">${lbl}</button>`;
      }).join('');
      if (!dataProg) return;
      let lancs = todosLanc.filter(r=>r.DATA===dataProg);
      if (filtroOp!=='TODAS') lancs = lancs.filter(v=>v.OP===filtroOp);
      if (!lancs.length) { lista.innerHTML=`<div class="empty-msg">Nenhum lançamento para ${labelData(dataProg)}.</div>`; return; }
      lista.innerHTML=`<div style="overflow-x:auto"><table>
        <thead><tr><th>OP</th><th>Veículo</th><th>Motorista</th><th>Destino</th><th>Ponto ON</th><th>Saída CD</th><th>Status</th></tr></thead>
        <tbody>${lancs.map(v=>{
          const st=calcStatus(v); const cor=OP_CORES[v.OP]||'#6b8099';
          return `<tr>
            <td><span class="op-pill" style="background:${cor}20;color:${cor}">${v.OP||'—'}</span></td>
            <td class="col-placa">${v.VEICULO||'—'}</td>
            <td>${v.MOTORISTA||'—'}</td>
            <td class="col-dest">${v.DESTINO||'—'}</td>
            <td class="mono">${v.PONTO_ON||'—'}</td>
            <td class="mono">${v.SAIDA_VEICULO_CD||'—'}</td>
            <td><span class="st-dot" style="background:${st.cor}"></span>${st.label}</td>
          </tr>`;
        }).join('')}</tbody>
      </table></div>`;
    }
    window.selecionarProg = (d) => { dataProg=d; renderProgramacao(); };

    // ── Histórico ─────────────────────────────────────────────
    function renderHistorico() {
      const picker = document.getElementById('hist-picker');
      const lista  = document.getElementById('hist-lista');
      if (!picker) return;
      const hoje = hojeISO();
      const passadas = historicoDatas.filter(d=>parseDate(d)<parseDate(hoje));
      const dias = ['dom','seg','ter','qua','qui','sex','sáb'];
      if (!passadas.length) { picker.innerHTML='<div style="color:var(--muted);font-size:13px">Nenhum histórico.</div>'; return; }
      picker.innerHTML = passadas.map(d=>
        `<button class="btn-data${d===historicoDataSel?' btn-data-ativa':''}" onclick="selecionarHistorico('${d}')">${d} (${dias[parseDate(d).getDay()]})</button>`
      ).join('');
      if (!historicoDataSel) { lista.innerHTML=''; return; }
      let lancs = todosLanc.filter(r=>r.DATA===historicoDataSel);
      if (filtroOp!=='TODAS') lancs = lancs.filter(v=>v.OP===filtroOp);
      if (!lancs.length) { lista.innerHTML=`<div class="empty-msg">Nenhum lançamento em ${historicoDataSel}.</div>`; return; }
      const dt = parseDate(historicoDataSel);
      lista.innerHTML=`
        <div style="font-size:13px;color:var(--muted);margin-bottom:12px">${historicoDataSel} (${dias[dt.getDay()]}) — ${lancs.length} lançamento${lancs.length!==1?'s':''}</div>
        <div style="overflow-x:auto"><table>
          <thead><tr><th>OP</th><th>Veículo</th><th>Motorista</th><th>Destino</th><th>Ponto ON</th><th>Saída CD</th><th>Chegada CD</th><th>KM</th><th>Hora Total</th><th>Status</th></tr></thead>
          <tbody>${lancs.map(v=>{
            const st=calcStatus(v); const cor=OP_CORES[v.OP]||'#6b8099';
            return `<tr>
              <td><span class="op-pill" style="background:${cor}20;color:${cor}">${v.OP||'—'}</span></td>
              <td class="col-placa">${v.VEICULO||'—'}</td>
              <td>${v.MOTORISTA||'—'}</td>
              <td class="col-dest">${v.DESTINO||'—'}</td>
              <td class="mono">${v.PONTO_ON||'—'}</td>
              <td class="mono">${v.SAIDA_VEICULO_CD||'—'}</td>
              <td class="mono">${v.CHEGADA_VEICULO_CD||'—'}</td>
              <td class="mono">${v.KM_PERCORRIDO?v.KM_PERCORRIDO+' km':'—'}</td>
              <td class="mono">${v.HORA_TOTAL||'—'}</td>
              <td><span class="st-dot" style="background:${st.cor}"></span>${st.label}</td>
            </tr>`;
          }).join('')}</tbody>
        </table></div>`;
    }
    window.selecionarHistorico = (d) => { historicoDataSel=d; renderHistorico(); };

    // ── Abas ──────────────────────────────────────────────────
    window.irAba = (aba) => {
      abaPainel = aba;
      ['dashboard','programacao','historico'].forEach(a => {
        const btn=document.getElementById('aba-'+a);
        const sec=document.getElementById('sec-'+a);
        if(btn) btn.classList.toggle('ativa', a===aba);
        if(sec) sec.style.display = a===aba?'block':'none';
      });
      atualizarDashboard();
    };

    // ── Init ──────────────────────────────────────────────────
    window.addEventListener('DOMContentLoaded', () => {
      const tick = () => {
        const d = new Date();
        const el = document.getElementById('relogio');
        if(el) el.textContent=`${String(d.getHours()).padStart(2,'0')}:${String(d.getMinutes()).padStart(2,'0')}`;
      };
      tick(); setInterval(tick,1000);
      sincronizar(false);
      setInterval(()=>sincronizar(true), SYNC_INTERVAL);
    });

    window.sincronizarManual = () => sincronizar(false);
  </script>

  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    :root{--bg:#080f18;--surf:#0e1a28;--card:#11202f;--bord:#1b2e42;--acc:#f0a500;--text:#dde6ef;--muted:#5a7a99;--danger:#e85555;}
    html,body{height:100vh;overflow:hidden;background:var(--bg);color:var(--text);font-family:'Barlow',sans-serif;}
    .mono{font-family:'JetBrains Mono',monospace;font-size:12px}

    /* ── Header ── */
    .site-header{position:fixed;top:0;left:0;right:0;z-index:100;background:var(--surf);}
    .topbar{display:flex;align-items:center;justify-content:space-between;padding:14px 24px;border-bottom:1px solid var(--bord);}
    .brand{font-family:'Barlow Condensed',sans-serif;font-weight:900;font-size:22px;color:var(--acc)}
    .brand span{color:var(--muted);font-weight:400;font-size:13px;margin-left:8px}
    .topbar-r{display:flex;align-items:center;gap:12px}
    #relogio{font-family:'JetBrains Mono',monospace;font-size:22px;color:var(--acc)}
    #sync-status{font-size:11px;color:var(--muted)}
    #sync-status.sync-ok{color:#34d399}
    #sync-status.sync-err{color:var(--danger)}
    .btn-sync{background:none;border:1px solid var(--bord);color:var(--muted);padding:5px 12px;border-radius:6px;cursor:pointer;font-size:12px;font-family:'Barlow',sans-serif}
    .btn-sync:hover{border-color:var(--acc);color:var(--acc)}
    .abas{display:flex;padding:0 24px;border-bottom:1px solid var(--bord)}
    .aba-btn{padding:12px 20px;background:none;border:none;border-bottom:2px solid transparent;color:var(--muted);cursor:pointer;font-size:14px;font-weight:500;transition:color .2s}
    .aba-btn.ativa{color:var(--acc);border-bottom-color:var(--acc)}
    .aba-btn:hover{color:var(--text)}

    /* ── Conteúdo ── */
    .site-content{position:fixed;top:98px;left:0;right:0;bottom:0;overflow-y:auto;-webkit-overflow-scrolling:touch;}

    /* ── KPIs ── */
    .resumo{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;padding:16px 24px 0}
    .cs{background:var(--card);border:1px solid var(--bord);border-radius:12px;padding:18px}
    .cs .num{font-family:'Barlow Condensed',sans-serif;font-size:44px;font-weight:900;line-height:1}
    .cs .lbl{font-size:11px;letter-spacing:1.5px;text-transform:uppercase;color:var(--muted);margin-top:4px}
    .n-total{color:var(--text)}.n-ok{color:#34d399}.n-rota{color:#fbbf24}.n-pend{color:var(--muted)}

    /* ── Barras por OP ── */
    .op-bar{display:flex;gap:10px;padding:12px 24px 0}
    .op-card{flex:1;background:var(--card);border:1px solid var(--bord);border-radius:10px;padding:10px 16px;display:flex;align-items:center;justify-content:space-between}
    .op-sig{font-family:'Barlow Condensed',sans-serif;font-weight:700;font-size:20px}
    .op-cnt{font-family:'JetBrains Mono',monospace;font-size:24px;font-weight:700}

    /* ── Filtros ── */
    .filtros{display:flex;align-items:center;gap:8px;padding:12px 24px 0;flex-wrap:wrap}
    .filtros-l{font-size:11px;letter-spacing:1.5px;text-transform:uppercase;color:var(--muted)}
    .btn-op{padding:5px 14px;border-radius:20px;border:1px solid var(--bord);background:transparent;color:var(--muted);cursor:pointer;font-size:13px;font-weight:600;transition:all .15s}
    .btn-op.ativo{background:var(--acc);border-color:var(--acc);color:#080f18}

    /* ── Tabela ── */
    .tab-wrap{padding:12px 24px 40px;overflow-x:auto}
    .cnt-label{font-size:12px;color:var(--muted);margin-bottom:8px}
    table{width:100%;border-collapse:collapse}
    thead th{text-align:left;font-size:11px;letter-spacing:1.5px;text-transform:uppercase;color:var(--muted);padding:9px 12px;border-bottom:1px solid var(--bord);white-space:nowrap}
    tbody td{padding:10px 12px;border-bottom:1px solid #0d1e2e;font-size:13px;vertical-align:middle}
    tbody tr:hover{background:#ffffff05}
    .op-pill{display:inline-block;padding:2px 10px;border-radius:4px;font-family:'Barlow Condensed',sans-serif;font-weight:700;font-size:13px}
    .col-placa{font-family:'Barlow Condensed',sans-serif;font-weight:700;font-size:15px}
    .col-dest{font-size:12px;max-width:200px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
    .st-dot{display:inline-block;width:8px;height:8px;border-radius:50%;margin-right:6px}
    .empty-row{text-align:center;padding:60px;color:var(--muted)}

    /* ── Prog / Hist ── */
    #sec-programacao,#sec-historico{display:none;padding:16px 24px 40px}
    .date-picker-wrap{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:16px}
    .btn-data{padding:7px 14px;background:var(--card);border:1px solid var(--bord);border-radius:8px;color:var(--muted);font-size:12px;font-family:'Barlow Condensed',sans-serif;font-weight:600;cursor:pointer;transition:all .2s}
    .btn-data:hover{border-color:var(--acc);color:var(--acc)}
    .btn-data-ativa{background:#4da6ff20!important;border-color:#4da6ff!important;color:#4da6ff!important}
    .sec-title{font-family:'Barlow Condensed',sans-serif;font-size:12px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:var(--muted);padding-bottom:10px;border-bottom:1px solid var(--bord);margin-bottom:14px}
    .empty-msg{text-align:center;padding:40px;color:var(--muted);font-size:14px}

    @media(max-width:768px){
      .resumo{grid-template-columns:repeat(2,1fr)}
      .op-bar{flex-wrap:wrap}
      .brand span{display:none}
      #relogio{font-size:18px}
      .tab-wrap{padding:12px}
    }
  </style>
</head>
<body>

<!-- CABEÇALHO FIXO -->
<div class="site-header">
  <div class="topbar">
    <div>
      <span class="brand">FROTA <span>Painel de Acompanhamento</span></span>
    </div>
    <div class="topbar-r">
      <span id="sync-status">Carregando...</span>
      <button id="btn-sync" class="btn-sync" onclick="sincronizarManual()">🔄 Atualizar</button>
      <span id="relogio">00:00</span>
    </div>
  </div>
  <div class="abas">
    <button id="aba-dashboard"   class="aba-btn ativa" onclick="irAba('dashboard')">📊 Dashboard</button>
    <button id="aba-programacao" class="aba-btn"       onclick="irAba('programacao')">📅 Programação</button>
