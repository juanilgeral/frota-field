<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#080f18">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <link rel="manifest" href="manifest.json">
  <title>Frota — Supervisão</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;600;700;900&family=Barlow:wght@300;400;500&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">

  <script type="module">
    import { initializeApp }   from "https://www.gstatic.com/firebasejs/11.8.1/firebase-app.js";
    import { getAuth, signInWithEmailAndPassword, signOut, onAuthStateChanged }
                               from "https://www.gstatic.com/firebasejs/11.8.1/firebase-auth.js";
    import { getFirestore, collection, doc, getDoc, setDoc, updateDoc, deleteDoc,
             query, where, onSnapshot, orderBy, serverTimestamp }
                               from "https://www.gstatic.com/firebasejs/11.8.1/firebase-firestore.js";

    // ═══════════════════════════════════════════════════════════════
    //  SUBSTITUA PELOS DADOS DO SEU PROJETO FIREBASE
    // ═══════════════════════════════════════════════════════════════
    const FIREBASE_CONFIG = {
      apiKey:            "AIzaSyA211lxR6Nk3bWH8lJWzYkHTMnlfHPar8A",
      authDomain:        "frota-field.firebaseapp.com",
      projectId:         "frota-field",
      storageBucket:     "frota-field.firebasestorage.app",
      messagingSenderId: "642844753455",
      appId:             "1:642844753455:web:9be3f31a8bb735dfbd50da"
    };

    // ── emails que têm acesso ao app de supervisão ──────────────────
    // Adicione os emails dos supervisores aqui
    const SUPERVISORES = [
      "irineumoura57@gmail.com",
      "juanilgeral@gmail.com",
    ];

    const OP_CORES = {LS:'#4da6ff',TL:'#ff8c42',HT:'#a78bfa',CV:'#34d399'};

    const app  = initializeApp(FIREBASE_CONFIG);
    const auth = getAuth(app);
    const db   = getFirestore(app);

    let currentUser = null;
    let todosLanc   = [];
    let todosUsers  = [];
    let filtroOp    = 'TODAS';
    let abaPainel   = 'dashboard'; // 'dashboard' | 'usuarios'

    const $ = id => document.getElementById(id);

    function hojeISO() {
      const d = new Date(new Date().toLocaleString('en-US', {timeZone: 'America/Sao_Paulo'}));
      return `${String(d.getDate()).padStart(2,'0')}/${String(d.getMonth()+1).padStart(2,'0')}/${String(d.getFullYear()).slice(-2)}`;
    }

    // ── AUTH ─────────────────────────────────────────────────────────
    onAuthStateChanged(auth, user => {
      if (user) {
        if (!SUPERVISORES.includes(user.email)) {
          signOut(auth);
          erroLogin('Acesso não autorizado.');
          return;
        }
        currentUser = user;
        mostrarDashboard();
      } else {
        mostrarLogin();
      }
    });

    window.fazerLogin = async () => {
      const email = $('l-email').value.trim();
      const senha = $('l-senha').value;
      const btn   = $('btn-login');
      btn.disabled=true; btn.textContent='Entrando...';
      try {
        await signInWithEmailAndPassword(auth, email, senha);
      } catch {
        erroLogin('Email ou senha inválidos.');
        btn.disabled=false; btn.textContent='ENTRAR';
      }
    };
    function erroLogin(msg) { $('erro-login').textContent=msg; $('erro-login').style.display='block'; }
    window.fazerLogout = () => signOut(auth);

    function mostrarLogin() {
      $('login-tela').style.display     = 'flex';
      $('dashboard-tela').style.display = 'none';
    }
    function mostrarDashboard() {
      $('login-tela').style.display     = 'none';
      $('dashboard-tela').style.display = 'block';
      $('sup-nome').textContent         = currentUser.email;
      iniciarRelogio();
      escutarLancamentos();
      escutarUsuarios();
    }

    function iniciarRelogio() {
      const el = $('relogio');
      const tick = () => {
        const d = new Date();
        if(el) el.textContent = `${String(d.getHours()).padStart(2,'0')}:${String(d.getMinutes()).padStart(2,'0')}`;
      };
      tick(); setInterval(tick,1000);
    }

    // ── ESCUTAS FIRESTORE ─────────────────────────────────────────────
    function escutarLancamentos() {
      onSnapshot(
        query(collection(db,'lancamentos'), where('DATA','==',hojeISO())),
        snap => {
          todosLanc = [];
          snap.forEach(d => todosLanc.push({fid:d.id,...d.data()}));
          renderCards(); renderTabela();
        }
      );
    }

    function escutarUsuarios() {
      onSnapshot(collection(db,'usuarios'), snap => {
        todosUsers = [];
        snap.forEach(d => todosUsers.push({uid:d.id,...d.data()}));
        renderUsuarios();
        atualizarBadgePendentes();
      });
    }

    // ── ABAS ─────────────────────────────────────────────────────────
    window.irAba = (aba) => {
      abaPainel = aba;
      ['dashboard','usuarios'].forEach(a => {
        const btn = $('aba-'+a);
        const sec = $('sec-'+a);
        if(btn) btn.classList.toggle('ativa', a===aba);
        if(sec) sec.style.display = a===aba ? 'block' : 'none';
      });
    };

    function atualizarBadgePendentes() {
      const n = todosUsers.filter(u => u.status==='pendente').length;
      const badge = $('badge-pendentes');
      if(badge) { badge.textContent = n||''; badge.style.display = n?'inline-block':'none'; }
    }

    // ── DASHBOARD ─────────────────────────────────────────────────────
    function calcStatus(v) {
      if (v.CHEGADA_VEICULO_CD && v.KM_CHEGADA) return {key:'concluido', label:'Concluído',    cor:'#34d399'};
      if (v.SAIDA_1 || v.ABERTURA_1)            return {key:'rota',      label:'Em rota',      cor:'#fbbf24'};
      if (v.SAIDA_VEICULO_CD)                   return {key:'transito',  label:'Em trânsito',  cor:'#f97316'};
      if (v.PONTO_ON)                           return {key:'iniciado',  label:'Iniciado',     cor:'#4da6ff'};
      return                                           {key:'pendente',  label:'Pendente',     cor:'#6b8099'};
    }

    function renderCards() {
      $('c-total').textContent     = todosLanc.length;
      $('c-concluido').textContent = todosLanc.filter(v=>calcStatus(v).key==='concluido').length;
      $('c-rota').textContent      = todosLanc.filter(v=>['rota','transito','iniciado'].includes(calcStatus(v).key)).length;
      $('c-pendente').textContent  = todosLanc.filter(v=>calcStatus(v).key==='pendente').length;
      ['LS','TL','HT','CV'].forEach(op => {
        const el = $('op-'+op);
        if(el) el.textContent = todosLanc.filter(v=>v.OP===op).length;
      });
    }

    window.setFiltroOp = op => {
      filtroOp = op;
      document.querySelectorAll('.btn-op').forEach(b => b.classList.toggle('ativo', b.dataset.op===op));
      renderTabela();
    };

    function renderTabela() {
      let lista = [...todosLanc];
      if (filtroOp !== 'TODAS') lista = lista.filter(v=>v.OP===filtroOp);
      lista.sort((a,b) => {
        const ord={pendente:0,iniciado:1,transito:2,rota:3,concluido:4};
        return (ord[calcStatus(a).key]||0) - (ord[calcStatus(b).key]||0);
      });
      const tbody = $('tbody');
      if (!lista.length) {
        tbody.innerHTML = `<tr><td colspan="8" class="empty-row">Nenhum lançamento encontrado</td></tr>`;
        $('cnt-label').textContent = '0 registros';
        return;
      }
      $('cnt-label').textContent = `${lista.length} registro${lista.length>1?'s':''}`;
      tbody.innerHTML = lista.map(v => {
        const st = calcStatus(v);
        const cor = OP_CORES[v.OP]||'#6b8099';
        return `<tr class="tr-data" onclick="abrirDetalhe('${v.fid}')">
          <td><span class="op-pill" style="background:${cor}20;color:${cor}">${v.OP||'—'}</span></td>
          <td class="col-placa">${v.VEICULO||'—'}</td>
          <td>${v.MOTORISTA||'—'}</td>
          <td class="mono">${v.PONTO_ON||'—'}</td>
          <td class="mono">${v.SAIDA_VEICULO_CD||'—'}</td>
          <td class="mono">${v.CHEGADA_VEICULO_CD||'—'}</td>
          <td class="mono">${v.KM_PERCORRIDO?v.KM_PERCORRIDO+' km':'—'}</td>
          <td><span class="st-dot" style="background:${st.cor}"></span>${st.label}</td>
        </tr>`;
      }).join('');
    }

    // ── DETALHE LANÇAMENTO ────────────────────────────────────────────
    window.apagarLancamentoSup = async (fid) => {
      if (!confirm('Apagar este lançamento?')) return;
      await deleteDoc(doc(db,'lancamentos', fid));
      fecharDetalhe();
    };

    window.abrirDetalhe = fid => {
      const v = todosLanc.find(x=>x.fid===fid);
      if(!v) return;
      const st  = calcStatus(v);
      const cor = OP_CORES[v.OP]||'#6b8099';
      const campos = [
        ['Operação',v.OP],['Veículo',v.VEICULO],['Motorista',v.MOTORISTA],
        ['Destino',v.DESTINO],['SM',v.SM],['Data Carregamento',v.DATA_CARRG],
        ['Ponto ON',v.PONTO_ON],['Previsão Refeição',v.PREVISAO_REFEICAO],
        ['Almoço',v.ALMOCO],['Saída Veículo CD',v.SAIDA_VEICULO_CD],
        ['KM Saída',v.KM_SAIDA],
        ['── Lojas ──',null],
        ['1ª Loja',v.LOJA_1],['Abertura 1',v.ABERTURA_1],['Fechado 1',v.FECHADO_1],['Saída 1',v.SAIDA_1],
        ['2ª Loja',v.LOJA_2],['Abertura 2',v.ABERTURA_2],['Fechado 2',v.FECHADO_2],['Saída 2',v.SAIDA_2],
        ['Total Loja',v.TOTAL_LOJA],
        ['── Retorno ──',null],
        ['Diesel Chegada',v.DIESEL_CHEGADA],['Chegada Veículo CD',v.CHEGADA_VEICULO_CD],
        ['Ponto OFF',v.PONTO_OFF_MOT],['Hora Total',v.HORA_TOTAL_MOTORISTA],
        ['Data Chegada',v.DATA_CHEGADA],['KM Chegada',v.KM_CHEGADA],
        ['KM Percorrido',v.KM_PERCORRIDO?v.KM_PERCORRIDO+' km':null],
        ['Observações',v.OBSERVACOES],['Lançado por',v._por],
      ];
      $('det-titulo').innerHTML = `<span class="op-pill" style="background:${cor}20;color:${cor}">${v.OP}</span> ${v.VEICULO||'—'}`;
      $('det-sub').textContent  = `${v.MOTORISTA||'—'} · ${v.DATA||''}`;
      $('det-st').innerHTML     = `<span class="st-dot" style="background:${st.cor}"></span>${st.label}`;
      $('det-campos').innerHTML = campos.map(([l,val])=>{
        if(val===null) return `<div class="det-sep">${l}</div>`;
        if(!val) return '';
        return `<div class="det-row"><span class="det-l">${l}</span><span class="det-v">${val}</span></div>`;
      }).join('');
      $('det-campos').innerHTML += `<button onclick="apagarLancamentoSup('${id}')" style="width:100%;margin-top:20px;padding:12px;background:none;border:1px solid #e8555560;color:#e85555;border-radius:8px;cursor:pointer;font-size:14px">🗑 Apagar lançamento</button>`;
      $('overlay').style.display='flex';
    };
    window.fecharDetalhe = () => { $('overlay').style.display='none'; };

    // ── PAINEL DE USUÁRIOS ────────────────────────────────────────────
    function renderUsuarios() {
      const pendentes  = todosUsers.filter(u=>u.status==='pendente');
      const ativos     = todosUsers.filter(u=>u.status==='ativo');
      const bloqueados = todosUsers.filter(u=>u.status==='bloqueado');

      $('sec-usuarios').innerHTML = `
        ${pendentes.length ? `
          <div class="usr-grupo-title">⏳ Aguardando aprovação (${pendentes.length})</div>
          ${pendentes.map(u => cardUsuario(u, true)).join('')}
        ` : ''}

        <div class="usr-grupo-title" style="margin-top:${pendentes.length?'24px':'0'}">✅ Ativos (${ativos.length})</div>
        ${ativos.length ? ativos.map(u => cardUsuario(u, false)).join('') : '<div class="usr-empty">Nenhum usuário ativo.</div>'}

        ${bloqueados.length ? `
          <div class="usr-grupo-title" style="margin-top:24px">🚫 Bloqueados (${bloqueados.length})</div>
          ${bloqueados.map(u => cardUsuario(u, false)).join('')}
        ` : ''}
      `;
    }

    function cardUsuario(u, isPendente) {
      const opCor = OP_CORES[u.op]||'#6b8099';
      const ativo = u.status==='ativo';
      const bloq  = u.status==='bloqueado';
      const pend  = u.status==='pendente';

      const acoes = pend ? `
        <button class="btn-usr btn-aprovar" onclick="aprovarUsuario('${u.uid}')">✅ Aprovar</button>
        <button class="btn-usr btn-rejeitar" onclick="excluirUsuario('${u.uid}','${u.nome}')">❌ Rejeitar</button>
      ` : ativo ? `
        <button class="btn-usr btn-bloquear" onclick="bloquearUsuario('${u.uid}')">🚫 Bloquear</button>
        <button class="btn-usr btn-excluir"  onclick="excluirUsuario('${u.uid}','${u.nome}')">🗑 Excluir</button>
      ` : `
        <button class="btn-usr btn-aprovar"  onclick="aprovarUsuario('${u.uid}')">✅ Reativar</button>
        <button class="btn-usr btn-excluir"  onclick="excluirUsuario('${u.uid}','${u.nome}')">🗑 Excluir</button>
      `;

      return `<div class="usr-card">
        <div class="usr-info">
          <div class="usr-nome">${u.nome||'—'}</div>
          <div class="usr-email">${u.email||'—'}</div>
          <div class="usr-tags">
            <span class="op-pill" style="background:${opCor}20;color:${opCor};font-size:12px">${u.op||'—'}</span>
            <span class="cargo-tag">${u.cargo||'—'}</span>
            <span class="status-tag st-${u.status}">${u.status}</span>
          </div>
        </div>
        <div class="usr-acoes">${acoes}</div>
      </div>`;
    }

    window.aprovarUsuario = async uid => {
      await updateDoc(doc(db,'usuarios',uid), {status:'ativo'});
    };
    window.bloquearUsuario = async uid => {
      await updateDoc(doc(db,'usuarios',uid), {status:'bloqueado'});
    };
    window.excluirUsuario = async (uid, nome) => {
      if (!confirm(`Excluir ${nome}? Esta ação não pode ser desfeita.`)) return;
      await deleteDoc(doc(db,'usuarios',uid));
    };

  </script>

  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    :root{
      --bg:#080f18;--surf:#0e1a28;--card:#11202f;--bord:#1b2e42;
      --acc:#f0a500;--text:#dde6ef;--muted:#5a7a99;--danger:#e85555;
    }
    html,body{min-height:100vh;background:var(--bg);color:var(--text);font-family:'Barlow',sans-serif}
    .mono{font-family:'JetBrains Mono',monospace;font-size:13px}

    /* LOGIN */
    #login-tela{display:flex;align-items:center;justify-content:center;min-height:100vh;padding:24px}
    .auth-box{background:var(--surf);border:1px solid var(--bord);border-radius:16px;padding:44px 32px;width:100%;max-width:380px}
    .logo{font-family:'Barlow Condensed',sans-serif;font-weight:900;font-size:36px;color:var(--acc)}
    .logo-sub{font-size:11px;letter-spacing:3px;text-transform:uppercase;color:var(--muted);margin-bottom:32px}
    .fg{margin-bottom:14px}
    .fg label{display:block;font-size:11px;letter-spacing:1.5px;text-transform:uppercase;color:var(--muted);margin-bottom:5px}
    .fg input{width:100%;background:var(--bg);border:1px solid var(--bord);border-radius:8px;padding:12px 14px;color:var(--text);font-size:15px;outline:none;transition:border-color .2s}
    .fg input:focus{border-color:var(--acc)}
    .btn-primary{width:100%;margin-top:6px;padding:14px;background:var(--acc);color:#080f18;border:none;border-radius:8px;font-family:'Barlow Condensed',sans-serif;font-size:18px;font-weight:700;cursor:pointer}
    .erro{display:none;background:#e8555520;border:1px solid var(--danger);border-radius:8px;padding:10px 14px;color:var(--danger);font-size:13px;margin-top:12px;text-align:center}

    /* DASHBOARD */
    #dashboard-tela{display:none}
    .topbar{display:flex;align-items:center;justify-content:space-between;padding:14px 24px;background:var(--surf);border-bottom:1px solid var(--bord)}
    .brand{font-family:'Barlow Condensed',sans-serif;font-weight:900;font-size:22px;color:var(--acc)}
    .brand span{color:var(--muted);font-weight:400;font-size:13px;margin-left:8px}
    .topbar-r{display:flex;align-items:center;gap:16px}
    #relogio{font-family:'JetBrains Mono',monospace;font-size:22px;color:var(--acc)}
    .btn-logout{background:none;border:1px solid var(--bord);color:var(--muted);padding:6px 14px;border-radius:6px;cursor:pointer;font-size:13px}
    .btn-logout:hover{color:var(--danger);border-color:var(--danger)}

    /* ABAS */
    .abas{display:flex;gap:0;padding:0 24px;background:var(--surf);border-bottom:1px solid var(--bord)}
    .aba-btn{padding:12px 20px;background:none;border:none;border-bottom:2px solid transparent;color:var(--muted);cursor:pointer;font-size:14px;font-weight:500;position:relative;transition:color .2s}
    .aba-btn.ativa{color:var(--acc);border-bottom-color:var(--acc)}
    .aba-btn:hover{color:var(--text)}
    .badge-n{display:none;position:absolute;top:8px;right:6px;background:var(--danger);color:#fff;border-radius:10px;padding:1px 6px;font-size:10px;font-weight:700}

    /* CARDS RESUMO */
    .resumo{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;padding:20px 24px 0}
    .cs{background:var(--card);border:1px solid var(--bord);border-radius:12px;padding:18px}
    .cs .num{font-family:'Barlow Condensed',sans-serif;font-size:44px;font-weight:900;line-height:1}
    .cs .lbl{font-size:11px;letter-spacing:1.5px;text-transform:uppercase;color:var(--muted);margin-top:4px}
    .n-total{color:var(--text)}.n-ok{color:#34d399}.n-rota{color:#fbbf24}.n-pend{color:var(--muted)}

    /* BARRA OPs */
    .ops-bar{display:flex;gap:10px;padding:14px 24px 0}
    .op-c{flex:1;background:var(--card);border:1px solid var(--bord);border-radius:10px;padding:10px 14px;display:flex;align-items:center;justify-content:space-between}
    .op-n{font-family:'Barlow Condensed',sans-serif;font-weight:700;font-size:18px}
    .op-cnt{font-family:'JetBrains Mono',monospace;font-size:22px}
    .op-ls .op-n,.op-ls .op-cnt{color:#4da6ff}
    .op-tl .op-n,.op-tl .op-cnt{color:#ff8c42}
    .op-ht .op-n,.op-ht .op-cnt{color:#a78bfa}
    .op-cv .op-n,.op-cv .op-cnt{color:#34d399}

    /* FILTROS */
    .filtros{display:flex;align-items:center;gap:8px;padding:14px 24px 0;flex-wrap:wrap}
    .filtros-l{font-size:11px;letter-spacing:1.5px;text-transform:uppercase;color:var(--muted)}
    .btn-op{padding:5px 14px;border-radius:20px;border:1px solid var(--bord);background:transparent;color:var(--muted);cursor:pointer;font-size:13px;font-weight:600;transition:all .15s}
    .btn-op.ativo{background:var(--acc);border-color:var(--acc);color:#080f18}

    /* TABELA */
    .tab-wrap{padding:14px 24px 40px;overflow-x:auto}
    .cnt-label{font-size:12px;color:var(--muted);margin-bottom:8px}
    table{width:100%;border-collapse:collapse}
    thead th{text-align:left;font-size:11px;letter-spacing:1.5px;text-transform:uppercase;color:var(--muted);padding:10px 12px;border-bottom:1px solid var(--bord);white-space:nowrap}
    .tr-data td{padding:11px 12px;border-bottom:1px solid #0d1e2e;font-size:14px;vertical-align:middle}
    .tr-data:hover{background:#ffffff05;cursor:pointer}
    .op-pill{display:inline-block;padding:2px 10px;border-radius:4px;font-family:'Barlow Condensed',sans-serif;font-weight:700;font-size:13px}
    .col-placa{font-family:'Barlow Condensed',sans-serif;font-weight:700;font-size:16px}
    .st-dot{display:inline-block;width:8px;height:8px;border-radius:50%;margin-right:6px}
    .empty-row{text-align:center;padding:60px;color:var(--muted)}

    /* USUÁRIOS */
    #sec-usuarios{display:none;padding:20px 24px 40px}
    .usr-grupo-title{font-family:'Barlow Condensed',sans-serif;font-size:13px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:var(--muted);padding-bottom:10px;border-bottom:1px solid var(--bord);margin-bottom:12px}
    .usr-card{background:var(--card);border:1px solid var(--bord);border-radius:12px;padding:16px;margin-bottom:10px;display:flex;align-items:flex-start;justify-content:space-between;gap:16px;flex-wrap:wrap}
    .usr-nome{font-family:'Barlow Condensed',sans-serif;font-weight:700;font-size:18px}
    .usr-email{font-size:13px;color:var(--muted);margin:2px 0 8px}
    .usr-tags{display:flex;gap:8px;flex-wrap:wrap;align-items:center}
    .cargo-tag{font-size:11px;background:#ffffff10;border:1px solid var(--bord);border-radius:4px;padding:2px 8px;color:var(--muted)}
    .status-tag{font-size:11px;border-radius:4px;padding:2px 8px;font-weight:600}
    .st-ativo{background:#34d39920;color:#34d399}
    .st-pendente{background:#fbbf2420;color:#fbbf24}
    .st-bloqueado{background:#e8555520;color:var(--danger)}
    .usr-acoes{display:flex;gap:8px;flex-wrap:wrap;flex-shrink:0}
    .btn-usr{padding:7px 14px;border-radius:8px;border:1px solid var(--bord);background:none;cursor:pointer;font-size:13px;font-weight:600;transition:all .15s;white-space:nowrap}
    .btn-aprovar{color:#34d399;border-color:#34d39940}.btn-aprovar:hover{background:#34d39920}
    .btn-rejeitar,.btn-excluir{color:var(--danger);border-color:#e8555540}.btn-rejeitar:hover,.btn-excluir:hover{background:#e8555520}
    .btn-bloquear{color:#fbbf24;border-color:#fbbf2440}.btn-bloquear:hover{background:#fbbf2420}
    .usr-empty{color:var(--muted);font-size:14px;padding:12px 0}

    /* OVERLAY DETALHE */
    #overlay{display:none;position:fixed;inset:0;background:#000a;z-index:200;align-items:flex-end;justify-content:center}
    .det-panel{background:var(--surf);border:1px solid var(--bord);border-radius:20px 20px 0 0;width:100%;max-width:600px;max-height:85vh;overflow-y:auto;padding:28px}
    .det-hd{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:20px}
    .det-titulo{font-family:'Barlow Condensed',sans-serif;font-weight:700;font-size:26px;display:flex;align-items:center;gap:10px}
    .det-sub{font-size:13px;color:var(--muted);margin-top:2px}
    .det-st{display:flex;align-items:center;font-size:13px;margin-top:6px}
    .btn-fechar{background:none;border:1px solid var(--bord);color:var(--muted);padding:8px 16px;border-radius:8px;cursor:pointer}
    .det-sep{font-size:11px;letter-spacing:2px;text-transform:uppercase;color:var(--muted);padding:14px 0 6px;border-bottom:1px solid var(--bord);margin-bottom:6px}
    .det-row{display:flex;justify-content:space-between;padding:8px 0;border-bottom:1px solid #0d1e2e}
    .det-l{font-size:12px;color:var(--muted)}.det-v{font-size:13px;font-weight:500;text-align:right;max-width:65%}

    @media(max-width:768px){
      .resumo{grid-template-columns:repeat(2,1fr)}
      .ops-bar{flex-wrap:wrap}
      .brand span{display:none}
      #relogio{font-size:18px}
      .tab-wrap{padding:12px}
    }
  </style>
</head>
<body>

<!-- LOGIN -->
<div id="login-tela">
  <div class="auth-box">
    <div class="logo">FROTA</div>
    <div class="logo-sub">Central de Supervisão</div>
    <div class="fg"><label>Email</label><input id="l-email" type="email" placeholder="supervisao@empresa.com" autocomplete="email"></div>
    <div class="fg"><label>Senha</label><input id="l-senha" type="password" placeholder="••••••••" onkeydown="if(event.key==='Enter')fazerLogin()"></div>
    <button id="btn-login" class="btn-primary" onclick="fazerLogin()">ENTRAR</button>
    <div id="erro-login" class="erro"></div>
  </div>
</div>

<!-- DASHBOARD -->
<div id="dashboard-tela">

  <div class="topbar">
    <div class="brand">FROTA <span>Supervisão · <span id="sup-nome"></span></span></div>
    <div class="topbar-r">
      <span id="relogio">00:00</span>
      <button class="btn-logout" onclick="fazerLogout()">Sair</button>
    </div>
  </div>

  <!-- Abas -->
  <div class="abas">
    <button id="aba-dashboard" class="aba-btn ativa" onclick="irAba('dashboard')">📊 Dashboard</button>
    <button id="aba-usuarios"  class="aba-btn"       onclick="irAba('usuarios')">
      👥 Usuários
      <span id="badge-pendentes" class="badge-n"></span>
    </button>
  </div>

  <!-- SEÇÃO DASHBOARD -->
  <div id="sec-dashboard">
    <div class="resumo">
      <div class="cs"><div class="num n-total"  id="c-total">0</div><div class="lbl">Total hoje</div></div>
      <div class="cs"><div class="num n-ok"     id="c-concluido">0</div><div class="lbl">Concluídos</div></div>
      <div class="cs"><div class="num n-rota"   id="c-rota">0</div><div class="lbl">Em operação</div></div>
      <div class="cs"><div class="num n-pend"   id="c-pendente">0</div><div class="lbl">Pendentes</div></div>
    </div>
    <div class="ops-bar">
      <div class="op-c op-ls"><span class="op-n">LS</span><span class="op-cnt" id="op-LS">0</span></div>
      <div class="op-c op-tl"><span class="op-n">TL</span><span class="op-cnt" id="op-TL">0</span></div>
      <div class="op-c op-ht"><span class="op-n">HT</span><span class="op-cnt" id="op-HT">0</span></div>
      <div class="op-c op-cv"><span class="op-n">CV</span><span class="op-cnt" id="op-CV">0</span></div>
    </div>
    <div class="filtros">
      <span class="filtros-l">Operação:</span>
      <button class="btn-op ativo" data-op="TODAS" onclick="setFiltroOp('TODAS')">Todas</button>
      <button class="btn-op" data-op="LS" onclick="setFiltroOp('LS')" style="color:#4da6ff;border-color:#4da6ff">LS</button>
      <button class="btn-op" data-op="TL" onclick="setFiltroOp('TL')" style="color:#ff8c42;border-color:#ff8c42">TL</button>
      <button class="btn-op" data-op="HT" onclick="setFiltroOp('HT')" style="color:#a78bfa;border-color:#a78bfa">HT</button>
      <button class="btn-op" data-op="CV" onclick="setFiltroOp('CV')" style="color:#34d399;border-color:#34d399">CV</button>
    </div>
    <div class="tab-wrap">
      <div class="cnt-label" id="cnt-label">—</div>
      <table>
        <thead>
          <tr>
            <th>OP</th><th>Veículo</th><th>Motorista</th>
            <th>Ponto ON</th><th>Saída CD</th><th>Chegada CD</th>
            <th>KM</th><th>Status</th>
          </tr>
        </thead>
        <tbody id="tbody"><tr><td colspan="8" class="empty-row">Aguardando lançamentos...</td></tr></tbody>
      </table>
    </div>
  </div>

  <!-- SEÇÃO USUÁRIOS -->
  <div id="sec-usuarios"></div>

</div>

<!-- OVERLAY DETALHE -->
<div id="overlay" onclick="if(event.target===this)fecharDetalhe()">
  <div class="det-panel">
    <div class="det-hd">
      <div>
        <div class="det-titulo" id="det-titulo">—</div>
        <div class="det-sub"    id="det-sub">—</div>
        <div class="det-st"     id="det-st">—</div>
      </div>
      <button class="btn-fechar" onclick="fecharDetalhe()">✕ Fechar</button>
    </div>
    <div id="det-campos"></div>
  </div>
</div>

</body>
</html>
